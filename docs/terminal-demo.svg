<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <!-- Terminal Window -->
  <rect width="680" height="520" rx="10" fill="#1e1e2e"/>

  <!-- Title Bar -->
  <rect width="680" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="680" height="10" fill="#313244"/>
  <!-- Traffic Lights -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#a6adc8">Terminal</text>

  <!-- Terminal Content -->
  <g font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">

    <!-- Step 1: Init -->
    <text x="20" y="62" fill="#6c7086"># Initialize your project</text>
    <text x="20" y="82">
      <tspan fill="#a6e3a1">$</tspan>
      <tspan fill="#cdd6f4"> npx envrizz init --project my-app</tspan>
    </text>
    <text x="20" y="102" fill="#f9e2af">Created envrizz.json configuration file</text>
    <text x="20" y="122" fill="#a6adc8">Project name: my-app</text>

    <!-- Step 2: List -->
    <text x="20" y="156" fill="#6c7086"># Preview what gets synced</text>
    <text x="20" y="176">
      <tspan fill="#a6e3a1">$</tspan>
      <tspan fill="#cdd6f4"> npx envrizz list</tspan>
    </text>
    <text x="20" y="196" fill="#a6adc8">Environment variables to sync:</text>
    <text x="20" y="218" fill="#89b4fa">.env:</text>
    <text x="20" y="238" fill="#a6adc8">  PORT=3000</text>
    <text x="20" y="258" fill="#a6adc8">  DATABASE_URL=postgres://localhost:5432/mydb</text>
    <text x="20" y="278" fill="#89b4fa">.env.local:</text>
    <text x="20" y="298" fill="#a6adc8">  API_KEY=sk_live_abc123...</text>
    <text x="20" y="318" fill="#a6adc8">  STRIPE_SECRET=whsec_def456...</text>

    <!-- Step 3: Push -->
    <text x="20" y="352" fill="#6c7086"># Push to AWS Secrets Manager</text>
    <text x="20" y="372">
      <tspan fill="#a6e3a1">$</tspan>
      <tspan fill="#cdd6f4"> npx envrizz push</tspan>
    </text>
    <text x="20" y="392" fill="#a6adc8">Syncing project: my-app</text>
    <text x="20" y="412" fill="#a6adc8">Found 4 environment variables across files:</text>
    <text x="20" y="432" fill="#a6adc8">  - .env: 2 variables</text>
    <text x="20" y="452" fill="#a6adc8">  - .env.local: 2 variables</text>
    <text x="20" y="472" fill="#a6e3a1">&#x2705; Successfully synced to AWS Secrets Manager</text>

    <!-- Step 4: Pull hint -->
    <text x="20" y="506" fill="#6c7086"># Teammate runs: npx envrizz pull  &#x2190; gets the same .env files</text>
  </g>
</svg>
